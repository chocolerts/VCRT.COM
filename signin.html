<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCRT | Core Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --dark-bg: #050505;
            --neon-outline: 0 0 10px var(--neon-blue);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-container {
            background: #0a0a0a;
            padding: 50px;
            border-radius: 20px;
            border: 1px solid #222;
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: 0.4s;
        }

        .login-container:hover {
            border-color: var(--neon-blue);
            box-shadow: var(--neon-outline);
        }

        .brand-name {
            font-weight: 900;
            letter-spacing: 8px;
            font-size: 2rem;
            margin-bottom: 30px;
            text-shadow: var(--neon-outline);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--neon-blue);
            background: #151515;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #444;
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--neon-blue);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="brand-name">VCRT</div>
        <p style="color: #444; font-size: 0.7rem; margin-bottom: 30px; letter-spacing: 2px;">ACCESS RESTRICTED // CORE_AUTH</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label>System Identifier</label>
                <input type="text" placeholder="Username" required>
            </div>
            
            <div class="input-group">
                <label>Access Protocol</label>
                <input type="password" placeholder="Password" required>
            </div>

            <button type="submit" class="btn-login">Initialize Session</button>
        </form>

        <a href="index.html" class="back-link">← RETURN TO MAIN INTERFACE</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Authentication Request Sent to VCRT Core.');
            // In a real app, you'd redirect to the dashboard here:
            // window.location.href = "index.html"; 
        });
    </script>

</body>
</html>
