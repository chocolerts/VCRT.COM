<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCRT | Core Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --neon-blue: #00f3ff; 
            --dark-bg: #050505;
            --nav-height: 110px;
            --neon-outline: 0 0 10px var(--neon-blue);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: white;
            padding-top: var(--nav-height);
        }

        /* DASHBOARD HEADER */
        .dashboard-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--nav-height);
            background: var(--dark-bg);
            border-bottom: 2px solid var(--neon-blue);
            box-shadow: 0 2px 25px rgba(0, 243, 255, 0.2);
            display: flex;
            align-items: center;
            padding: 0 40px;
            z-index: 1000;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-right: auto;
        }

        .brand-name {
            font-weight: 900;
            letter-spacing: 4px;
            font-size: 1.6rem;
            color: #ffffff;
            text-shadow: var(--neon-outline);
        }

        .dash-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .menu-row { display: flex; gap: 25px; }

        .dash-link {
            text-decoration: none;
            color: #ffffff;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
            transition: 0.3s;
            background: none;
            border: none;
            cursor: pointer;
        }

        .dash-link:hover {
            opacity: 1;
            color: var(--neon-blue);
            text-shadow: var(--neon-outline);
        }

        /* MAIN CONTENT - VCRT CORE SECTION */
        .main-content {
            padding: 60px 10%;
            text-align: center;
        }

        .core-header {
            margin-bottom: 50px;
        }

        .core-header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1px;
        }

        /* CHART DASHBOARD CONTAINER */
        .chart-container {
            background: #111;
            border: 1px solid #222;
            border-radius: 15px;
            padding: 30px;
            margin: 0 auto 50px auto;
            max-width: 900px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: 0.4s;
        }
        
        .chart-container:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
        }

        .class-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .class-card {
            background: #111;
            border: 1px solid #222;
            padding: 40px 20px;
            border-radius: 15px;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .class-card:hover {
            border-color: var(--neon-blue);
            box-shadow: var(--neon-outline);
            transform: translateY(-10px);
        }

        .class-card h2 {
            font-size: 3rem;
            font-weight: 900;
            margin: 10px 0;
            color: #fff;
        }

        .class-card p {
            color: #666;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .btn-select {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.7rem;
            transition: 0.3s;
        }

        .btn-select:hover {
            background: var(--neon-blue);
            color: #000;
        }

        /* Decor Line for the cards */
        .class-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--neon-blue);
            opacity: 0;
            transition: 0.3s;
        }

        .class-card:hover::after {
            opacity: 1;
        }
    </style>
</head>
<body>

    <header class="dashboard-header">
        <div class="brand-container">
            <div class="brand-name">VCRT</div>
        </div>

        <div class="dash-menu">
            <div class="menu-row">
    <a href="vehicle.html" class="dash-link">2026</a>
    <a href="#metrics-dashboard" class="dash-link" style="color: var(--neon-blue);">Dashboard</a>
    <a href="transaction.html" class="dash-link">Log Transaction</a> <!-- Added Link -->
    <a href="#" class="dash-link">Team</a>
    <a href="#" class="dash-link">Partners</a>
    <a href="#" class="dash-link">Achievements</a>
</div>
            <div class="menu-row" style="border-top: 1px solid #222; padding-top: 8px;">
                <a href="#" class="dash-link">History</a>
                <a href="signin.html" class="dash-link">Sign In</a>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="core-header">
            <h1>VCRT <span style="color: var(--neon-blue); text-shadow: var(--neon-outline);">CORE</span></h1>
            <p style="color: #444; letter-spacing: 5px; font-size: 0.8rem;">VEHICLE CLASS SELECTION</p>
        </div>

        <div id="metrics-dashboard" class="chart-container">
            <h3 style="color: #fff; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; text-align: left;">
                <span style="color: var(--neon-blue)">//</span> Vehicle Class Performance Metrics
            </h3>
            <div style="position: relative; height:300px; width:100%">
                <canvas id="vcrtAnalyticsChart"></canvas>

        </div>

        <div class="class-grid">
            <div class="class-card">
                <p>FSAE</p>
                <h2>150CC</h2>
                <button class="btn-select">Enter Class</button>
            </div>

            <div class="class-card">

                <button class="btn-select">Enter Class</button>
            </div>

            <div class="class-card">
                <p>Future Tech</p>
                <h2>EV</h2>
                <button class="btn-select">Enter Class</button>
            </div>
        </div>
    </main>

    <div id="gallery-section" style="margin-top: 200px; padding-bottom: 100px;">
        <h2 style="color: #222; letter-spacing: 15px; font-size: 0.7rem; margin-bottom: 50px; text-align: center;">
            VCRT // VISUAL_ASSETS
        </h2>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto;">
            <div class="gallery-item">
                <img src="WhatsApp Image 2026-02-09 at 4.25.38 PM.jpeg" alt="VCRT View 1" style="width: 100%; height: 400px; object-fit: cover; border-radius: 10px; border: 1px solid rgba(0, 243, 255, 0.3); transition: 0.4s;">
                <p style="font-size: 0.6rem; color: #444; margin-top: 10px; letter-spacing: 2px; text-align: center;">ENGINEERING FOR 150CC</p>
            </div>

            <div class="gallery-item">
                <img src="WhatsApp Image 2026-02-09 at 4.25.40 PM.jpeg" alt="VCRT View 2" style="width: 100%; height: 400px; object-fit: cover; border-radius: 10px; border: 1px solid rgba(0, 243, 255, 0.3); transition: 0.4s;">
                <p style="font-size: 0.6rem; color: #444; margin-top: 10px; letter-spacing: 2px; text-align: center;">150CC ENGINE</p>
            </div>

            <div class="gallery-item">
                <img src="WhatsApp Image 2026-02-09 at 2.54.54 PM.jpeg" alt="VCRT View 3" style="width: 100%; height: 400px; object-fit: cover; border-radius: 10px; border: 1px solid rgba(0, 243, 255, 0.3); transition: 0.4s;">
                <p style="font-size: 0.6rem; color: #444; margin-top: 10px; letter-spacing: 2px; text-align: center;">150CC INTRODUCTION</p>
            </div>
        </div>
    </div>

    <style>
        .gallery-item img:hover {
            border-color: var(--neon-blue) !important;
            box-shadow: var(--neon-outline);
            transform: scale(1.02);
            filter: brightness(1.2);
        }
    </style>

    <script>
        function addMoney(type) {
            const val = prompt(`Enter ${type} amount:`);
            if (val) alert(`${type.toUpperCase()} Logged: $${val}`);
        }

        // INITIALIZE CHART.JS CHART
        document.addEventListener("DOMContentLoaded", function () {
            const ctx = document.getElementById('vcrtAnalyticsChart').getContext('2d');
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['150CC (FSAE)', '600CC (FSM)', 'EV (FUTURE TECH)'],
                    datasets: [{
                        label: 'Lap Completion Rate (%)',
                        data: [85, 92, 78], // Dummy placeholder telemetry data
                        backgroundColor: 'rgba(0, 243, 255, 0.2)',
                        borderColor: '#00f3ff',
                        borderWidth: 2,
                        borderRadius: 5,
                        hoverBackgroundColor: 'rgba(0, 243, 255, 0.5)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: '#666',
                                font: { family: 'Inter', size: 10 }
                            }
                        }
                    },
                    scales: {
                        y: {
                            grid: { color: '#222' },
                            ticks: { color: '#666', font: { family: 'Inter' } },
                            beginAtZero: true,
                            max: 100
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#fff', font: { family: 'Inter', weight: 'bold' } }
                                
        document.addEventListener("DOMContentLoaded", function () {
    const ctx = document.getElementById('vcrtAnalyticsChart').getContext('2d');
    
    // 1. Retrieve transaction ledger from LocalStorage
    const transactions = JSON.parse(localStorage.getItem('vcrt_transactions')) || [];
    
    // 2. Set default baseline budgets for the classes
    let finances = {
        '150CC': 1200,  // Base funding starting points
        '600CC': 3000,
        'EV': 5000
    };

    // 3. Process existing transactions to calculate net budget
    transactions.forEach(tx => {
        const key = tx.vClass; // '150CC', '600CC', or 'EV'
        if (finances.hasOwnProperty(key)) {
            if (tx.type === 'income') {
                finances[key] += tx.amount;
            } else if (tx.type === 'expense') {
                finances[key] -= tx.amount;
            }
        }
    });

    // 4. Initialize Chart.js with dynamic data
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['150CC (FSAE)', '600CC (FSM)', 'EV (FUTURE TECH)'],
            datasets: [{
                label: 'Available Class Budget ($)',
                data: [finances['150CC'], finances['600CC'], finances['EV']], 
                backgroundColor: 'rgba(0, 243, 255, 0.15)',
                borderColor: '#00f3ff',
                borderWidth: 2,
                borderRadius: 5,
                hoverBackgroundColor: 'rgba(0, 243, 255, 0.4)'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    labels: {
                        color: '#aaa',
                        font: { family: 'Inter', size: 10 }
                    }
                }
            },
            scales: {
                y: {
                    grid: { color: '#1a1a1a' },
                    ticks: { color: '#666', font: { family: 'Inter' } },
                    beginAtZero: true
                },
                x: {
                    grid: { display: false },
                    ticks: { color: '#fff', font: { family: 'Inter', weight: 'bold' } }
                }
            }
        }
    });
});
    </script>

</body>
</html>
